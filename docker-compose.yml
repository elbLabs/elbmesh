services:
  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
  restate:
    image: docker.io/restatedev/restate:1.6.2
    environment:
      RESTATE_NODE_NAME: elbmesh-restate
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./restate-server.toml:/restate-data/config/restate.toml:ro
    ports:
      - "${ELBMESH_RESTATE_INGRESS_PORT:-8080}:8080"
      - "${ELBMESH_RESTATE_ADMIN_PORT:-9070}:9070"
